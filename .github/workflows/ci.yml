name: CI

on:
  push:
    branches:
      - main
      - dev

  pull_request:

jobs:
  test:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: Ruff Format
        run: ruff format --check .

      - name: mypy
        run: mypy src

      - name: Run Tests
        run: pytest --cov=src/whatsappy --cov-report=term-missing
